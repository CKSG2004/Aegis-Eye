<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Aegis Eye</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Roboto&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Roboto', sans-serif;
      height: 100vh;
      background-image: url('/static/images/img1.jpg'); /* ✅ Your background image path */
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
      background-attachment: fixed;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      display: flex;
      background-color: white; /* ✅ Keeps the form non-transparent */
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      width: 90%;
      max-width: 900px;
      padding: 40px;
      gap: 40px;
    }

    .left {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 24px;
      text-align: center;
      color: #212529;
    }

    .right {
      flex: 2;
    }

    form {
      display: flex;
      flex-direction: column;
    }

    input[type="text"] {
      padding: 12px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      margin-bottom: 24px;
      width: 100%;
    }

    .checkbox-group {
      display: flex;
      flex-direction: column;
      margin-bottom: 30px;
    }

    .checkbox-group label {
      font-weight: 500;
      display: flex;
      align-items: center;
      margin-bottom: 14px;
    }

    button {
      background-color: #212529;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #343a40;
    }

    @media screen and (max-width: 768px) {
      .container {
        flex-direction: column;
        padding: 20px;
      }

      .left {
        font-size: 20px;
        margin-bottom: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="left">
      Aegis Eye <br><br>Scan smart. Secure faster.
    </div>

    <div class="right">
      <form method="POST" action="/scan">
        <input type="text" name="domain" placeholder="Enter domain (e.g., example.com)" required>

        <div class="checkbox-group">
          <label><input type="checkbox" name="scan_options" value="whois" checked> WHOIS Lookup</label>
          <label><input type="checkbox" name="scan_options" value="port" checked> Port Scan</label>
          <label><input type="checkbox" name="scan_options" value="subdomain" checked> Subdomain Finder</label>
          <label><input type="checkbox" name="scan_options" value="headers" checked> HTTP Headers Check</label>
          <label><input type="checkbox" name="scan_options" value="vuln" checked> Basic Vulnerability Check</label>
          <label><input type="checkbox" name="scan_options" value="tech" checked> Tech Stack Fingerprinting</label>
        </div>

        <button type="submit"><i class="fas fa-magnifying-glass"></i> Scan</button>
      </form>
    </div>
  </div>
</body>
</html>
